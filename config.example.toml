# web3-auth-svc (OPNet) configuration
# Install to: /etc/web3-auth/opnet.toml
#
# This file is OPTIONAL. Without it, the auth-svc uses:
#   port = 32448  (derived: 1024 + crc32("opnet") % 64511)
#   pending_dir = /run/libpam-web3/pending
#   cert/key = /etc/libpam-web3/tls/{cert,key}.pem
#   pages_dir = /usr/share/blockhost/signing-pages/opnet

[server]
# Override the derived port if needed
# port = 32448
# pending_dir = "/run/libpam-web3/pending"
# cert = "/etc/libpam-web3/tls/cert.pem"
# key = "/etc/libpam-web3/tls/key.pem"
# pages_dir = "/usr/share/blockhost/signing-pages/opnet"
